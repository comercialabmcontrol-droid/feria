<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Contacto Feria</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    :root {
      --green:      #2E7D32;
      --green-dark: #1B5E20;
      --white:      #FFFFFF;
      --black:      #1A1A1A;
      --gray-bg:    #F2F2F2;
      --gray-border:#BDBDBD;
      --gray-text:  #616161;
    }

    html, body {
      height: 100%;
      background: var(--gray-bg);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--black);
      overflow: hidden; /* No scroll en modo kiosco */
    }

    /* ── LAYOUT PRINCIPAL ── */
    .screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 40px;
      gap: 28px;
    }

    /* ── CABECERA ── */
    .header {
      text-align: center;
    }

    .header h1 {
      font-size: clamp(24px, 2.8vw, 42px);
      font-weight: 700;
      color: var(--black);
      line-height: 1.3;
      letter-spacing: -0.3px;
      max-width: 1400px;
    }

    .header h1 span {
      color: var(--green);
    }

    /* ── TARJETA FORMULARIO ── */
    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 6px 32px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 1400px;
      padding: clamp(28px, 3vw, 48px) clamp(40px, 5vw, 80px);
    }

    /* Fila de 3 campos en horizontal */
    .fields-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 28px;
      margin-bottom: 24px;
    }

    .field label {
      display: block;
      font-size: clamp(10px, 0.9vw, 13px);
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--gray-text);
      margin-bottom: 8px;
    }

    .field label .opcional {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.9em;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: clamp(12px, 1.2vw, 18px) clamp(12px, 1.2vw, 18px);
      font-size: clamp(15px, 1.4vw, 20px);
      font-family: inherit;
      border: 2px solid var(--gray-border);
      border-radius: 8px;
      background: var(--gray-bg);
      color: var(--black);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--green);
      background: var(--white);
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #C0C0C0;
    }

    .field textarea {
      resize: none;
      line-height: 1.5;
    }

    /* Fila asunto: full width */
    .field-asunto {
      margin-bottom: 0;
    }

    /* ── DIVISOR ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 28px 0 26px;
    }

    .divider-line {
      flex: 1;
      height: 2px;
      background: var(--green);
      opacity: 0.2;
    }

    .divider-label {
      font-size: clamp(10px, 0.85vw, 13px);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--green);
    }

    /* ── BOTONES DE ENVÍO ── */
    .send-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    .btn-send {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(20px, 2.5vw, 36px) clamp(24px, 3vw, 48px);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.12s, filter 0.12s, box-shadow 0.12s;
      text-align: left;
      -webkit-appearance: none;
      gap: 24px;
    }

    .btn-send:active {
      transform: scale(0.97);
    }

    .btn-abm {
      background: #FFFFFF;
      border: 2.5px solid #E0E0E0;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .btn-abm:hover {
      border-color: var(--green);
      box-shadow: 0 6px 24px rgba(46,125,50,0.18);
    }

    .btn-qd {
      background: #1A1A1A;
      border: 2.5px solid #1A1A1A;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
    }

    .btn-qd:hover {
      filter: brightness(1.18);
      box-shadow: 0 6px 24px rgba(0,0,0,0.30);
    }

    /* Contenedor del logo — fondo propio para que se vea siempre */
    .btn-logo-wrap {
      flex-shrink: 0;
      background: #ffffff;
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-logo-wrap-light {
      /* Para Quickdoor sobre fondo negro: caja blanca para que el logo se vea */
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .btn-logo {
      height: clamp(40px, 4.5vw, 70px);
      width: auto;
      max-width: 240px;
      object-fit: contain;
      display: block;
    }

    .btn-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .btn-name {
      font-size: clamp(17px, 1.8vw, 26px);
      font-weight: 800;
      line-height: 1.2;
    }

    .btn-sub {
      font-size: clamp(12px, 1.1vw, 17px);
      font-weight: 400;
    }

    .btn-name-green  { color: #2E7D32; }
    .btn-sub-gray    { color: #616161; }
    .btn-name-white  { color: #ffffff; }
    .btn-sub-white   { color: rgba(255,255,255,0.65); }

    .btn-arrow {
      font-size: clamp(20px, 2vw, 30px);
      flex-shrink: 0;
    }

    .btn-arrow-green { color: #2E7D32; }
    .btn-arrow-white { color: rgba(255,255,255,0.65); }

    /* ── TOAST ── */
    .toast {
      display: none;
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--black);
      color: var(--white);
      padding: 16px 36px;
      border-radius: 10px;
      font-size: clamp(14px, 1.2vw, 18px);
      font-weight: 600;
      box-shadow: 0 6px 28px rgba(0,0,0,0.25);
      z-index: 100;
      white-space: nowrap;
      animation: fadeUp 0.3s ease;
    }

    .toast.success { background: var(--green-dark); }
    .toast.error   { background: #C62828; }
    .toast.show    { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── OVERLAY ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.75);
      z-index: 50;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .overlay.show { display: flex; }

    .spinner {
      width: 52px;
      height: 52px;
      border: 5px solid var(--gray-border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .overlay p {
      font-size: 15px;
      color: var(--gray-text);
      font-weight: 600;
    }

    /* ── FOOTER ── */
    .footer {
      font-size: clamp(11px, 0.85vw, 13px);
      color: #BDBDBD;
      text-align: center;
    }
  </style>
</head>

<div class="screen">

  <div class="header">
    <h1>Deja tus datos para recibir más información<br>sobre nuestros <span>productos y soluciones</span></h1>
  </div>

  <div class="card">

      <div class="field">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" placeholder="600 000 000" autocomplete="off">

      <div class="field">
        <label for="email">Correo electrónico</label>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p>Abriendo correo...</p>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ───────────────────────────────────────────────────────────
  // SIN SERVIDOR: usa mailto: para abrir la app de correo
  // (normalmente Gmail en Android) con todo ya rellenado.
  // El cliente solo tiene que pulsar el icono de "Enviar".
  // ───────────────────────────────────────────────────────────
  const DESTINOS = {
    abm: {
      nombre: "ABM Control",
      email:  "comercial@abmcontrol.com"
    },
    quickdoor: {
      nombre: "Quickdoor",
      email:  ""  // ← Añadir el email cuando esté disponible
    }
  };

  function validar() {
    const empresa  = document.getElementById('empresa').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const email    = document.getElementById('email').value.trim();

    if (!empresa) {
      mostrarToast("Por favor, indica tu empresa o nombre.", "error");
      document.getElementById('empresa').focus();
      return null;
    }
    if (!telefono || !/^[\d\s\+\-\(\)]{7,15}$/.test(telefono)) {
      mostrarToast("Introduce un teléfono válido.", "error");
      document.getElementById('telefono').focus();
      return null;
    }
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      mostrarToast("Introduce un correo electrónico válido.", "error");
      document.getElementById('email').focus();
      return null;
    }
    return { empresa, telefono, email };
  }

  function enviar(destino) {
    const datos = validar();
    if (!datos) return;

    const dest = DESTINOS[destino];
    if (!dest.email) {
      mostrarToast("El correo de " + dest.nombre + " aún no está configurado.", "error");
      return;
    }

    const asuntoTexto = document.getElementById('asunto').value.trim();
    const asuntoCorreo = encodeURIComponent("[Feria] Nuevo contacto: " + datos.empresa);
    const cuerpo = encodeURIComponent(
      "Nuevo contacto desde la feria de exposición:\n\n" +
      "Empresa / Autónomo: " + datos.empresa + "\n" +
      "Teléfono: " + datos.telefono + "\n" +
      "Correo: " + datos.email + "\n" +
      (asuntoTexto ? "\nInformación de interés:\n" + asuntoTexto + "\n" : "") +
      "\n—\nEnviado desde el formulario de feria."
    );

    mostrarOverlay(true);

    // Intento 1: intent específico de Gmail (solo funciona en Chrome/Android)
    // Si Gmail está instalado, lo abre directamente. Si no, falla en
    // silencio y usamos el mailto: normal como respaldo.
    const gmailIntent =
      "intent://co?to=" + encodeURIComponent(dest.email) +
      "&subject=" + asuntoCorreo +
      "&body=" + cuerpo +
      "#Intent;scheme=mailto;package=com.google.android.gm;end";

    const mailtoLink =
      "mailto:" + dest.email +
      "?subject=" + asuntoCorreo +
      "&body=" + cuerpo;

    setTimeout(() => {
      mostrarOverlay(false);

      // Probamos primero el intent de Gmail; si el navegador no
      // soporta "intent://" (no es Chrome/Android), usamos mailto:
      try {
        window.location.href = gmailIntent;
      } catch (e) {
        window.location.href = mailtoLink;
      }

      // Como red de seguridad: si tras un momento seguimos en la
      // página (el intent falló porque Gmail no está instalado),
      // probamos con el mailto: genérico.
      setTimeout(() => {
        window.location.href = mailtoLink;
      }, 600);

      setTimeout(() => {
        mostrarToast("Revisa la app de correo y pulsa Enviar para confirmar.", "success");
        limpiarFormulario();
      }, 1400);

    }, 500);
  }

  function mostrarOverlay(show) {
    document.getElementById('overlay').classList.toggle('show', show);
  }

  function mostrarToast(msg, tipo) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = "toast " + (tipo || "success") + " show";
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.classList.remove('show'); }, 4500);
  }

  function limpiarFormulario() {
    ['empresa','telefono','email','asunto'].forEach(function(id) {
      document.getElementById(id).value = '';
    });
  }

  // Bloqueo de zoom por doble toque
  let lastTap = 0;
  document.addEventListener('touchend', function(e) {
    const now = Date.now();
    if (now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive: false });

  // Bloqueo menú contextual (pulsación larga)
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  });
</script>
